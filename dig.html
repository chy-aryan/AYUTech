<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  
  <title>Health Diagnostic & Recommendations</title>
  <link rel="stylesheet" href="style6.css">
</head>
<body>
  <div class="container">
    <h1>Health Diagnostic & Recommendations</h1>
    <form id="diagnosticForm">
      <div class="form-group full-width">
        <label for="name">Patient Name</label>
        <input type="text" id="name" placeholder="Enter your name" required />
      </div>
      
      <div class="form-group">
        <label for="sugar">Sugar Level (mg/dL)</label>
        <input type="number" id="sugar" placeholder="e.g., 120" required />
      </div>
      
      <div class="form-group">
        <label for="bloodPressure">Blood Pressure (mm Hg)</label>
        <input type="text" id="bloodPressure" placeholder="e.g., 120/80" required />
      </div>
      
      <div class="form-group">
        <label for="cholesterol">Cholesterol Level (mg/dL)</label>
        <input type="number" id="cholesterol" placeholder="e.g., 180" required />
      </div>
      
      <!-- Additional diagnostic fields can be added here -->

      <div class="form-group full-width form-center">
        <button type="submit">Get Recommendations</button>
      </div>
    </form>
    
    <div id="recommendationOutput">
      <!-- Recommendations will be shown here -->
    </div>
  </div>
  
  <script src="/dig.js"></script>
</body>
</html>
